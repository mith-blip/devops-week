apiVersion: v1
kind: Service
metadata:
  name: devops-app-service
spec:
  type: NodePort                   # exposes the service on a port of the node
  selector:
    app: devops-app                # routes to pods with THIS label
  ports:
    - port: 80                     # the service's own port
      targetPort: 5000             # the container port to forward to